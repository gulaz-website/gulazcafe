<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login | Gulaz Business Centre</title>

<link rel="stylesheet" href="css/style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

<style>

body{

background:#f4f7fb;
font-family:Poppins,sans-serif;
display:flex;
justify-content:center;
align-items:center;
height:100vh;

}

.login-box{

width:420px;
background:#fff;
padding:40px;
border-radius:20px;
box-shadow:0 15px 40px rgba(0,0,0,.1);

}

.logo{

text-align:center;
margin-bottom:25px;

}

.logo i{

font-size:55px;
color:#0bd771;

}

.logo h2{

margin-top:10px;

}

.input-group{

margin-bottom:20px;

}

.input-group label{

display:block;
margin-bottom:8px;
font-weight:600;

}

.input-group input{

width:100%;
padding:14px;
border:1px solid #ddd;
border-radius:10px;
font-size:16px;

}

.input-group input:focus{

border-color:#0bd771;
outline:none;

}

.remember{

display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;

}

.remember label{

font-size:14px;

}

.remember a{

text-decoration:none;
color:#0bd748;

}

button{

width:100%;
padding:15px;
background:#0bd760;
color:#fff;
border:none;
border-radius:10px;
font-size:18px;
cursor:pointer;
transition:.3s;

}

button:hover{

background:#089874;

}

.signup{

text-align:center;
margin-top:25px;

}

.signup a{

color:#0bd771;
text-decoration:none;
font-weight:bold;

}

.error{

color:red;
font-size:14px;
display:none;
margin-top:10px;

}

</style>

</head>

<body>

<div class="login-box">

<div class="logo">

<i class="fa-solid fa-print"></i>

<h2>Gulaz Business Centre</h2>

<p>Sign in to your account</p>

</div>

<form id="loginForm">

<div class="input-group">

<label>Email Address</label>

<input
type="email"
id="email"
placeholder="Enter your email"
required>

</div>

<div class="input-group">

<label>Password</label>

<input
type="password"
id="password"
placeholder="Enter your password"
required>

</div>

<div class="remember">

<label>

<input type="checkbox">

Remember Me

</label>

<a href="forgot-password.html">

Forgot Password?

</a>

</div>

<button type="submit">

<i class="fa-solid fa-right-to-bracket"></i>

Login

</button>

<p class="error" id="error">

Invalid email or password.

</p>

</form>

<div class="signup">

Don't have an account?

<a href="register.html">

Create Account

</a>

</div>

</div>

<script src="login.js"></script>

</body>

</html>
